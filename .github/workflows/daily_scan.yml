name: Daily Entry Scanner + Alerts

on:
  # Run at 6:00 AM UTC daily (5:00 PM AEDT)
  schedule:
    - cron: '0 6 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Combined score threshold for alerts'
        required: false
        default: '70'
        type: string
      dry_run:
        description: 'Preview only (no email)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force_email:
        description: 'Send email even if no new entries'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  daily_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily ping system
        working-directory: scripts
        run: |
          THRESHOLD="${{ github.event.inputs.threshold || '70' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          FORCE="${{ github.event.inputs.force_email || 'false' }}"
          
          ARGS="--threshold $THRESHOLD --input ../data/screener_results.json --top 75"
          
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          
          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force-email"
          fi
          
          python daily_ping.py $ARGS
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          PYTHONUNBUFFERED: "1"

      - name: Commit updated entry signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/entry_signals.json data/entry_signals.csv data/previous_alerts.json 2>/dev/null || true
          
          DATE=$(date +%Y-%m-%d)
          
          git diff --cached --quiet || \
            git commit -m "📊 Daily entry scan: ${DATE}"
          
          git push
